<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presentation</title>
<style>
  html,body { margin:0; height:100%; background:#0a0e1a; color:#e6edf7;
    font-family: ui-sans-serif, system-ui, sans-serif; display:flex; align-items:center; justify-content:center; }
  form { display:flex; flex-direction:column; gap:12px; width:min(320px, 86vw); }
  h1 { font-size:15px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:#22d3ee; margin:0 0 4px; }
  input { background:#0d1322; border:1px solid rgba(148,163,184,.25); color:#e6edf7;
    border-radius:8px; padding:10px 12px; font-size:14px; outline:none; }
  input:focus { border-color:#22d3ee; }
  button { background:#22d3ee; color:#06222a; border:0; border-radius:8px; padding:10px;
    font-weight:700; font-size:13px; letter-spacing:.06em; cursor:pointer; }
  .err { color:#f87171; font-size:12px; min-height:14px; margin:0; }
</style>
</head>
<body>
<form id="f">
  <h1>Presentation</h1>
  <input id="p" type="password" placeholder="Пароль" autofocus autocomplete="current-password">
  <p class="err" id="e"></p>
  <button type="submit">Відкрити</button>
</form>
<script>
const HASH = "cfd830d7b195d63ebe1b70825a127e3492993387ec58a6a4e53ca968a8df6cf1";
const KEY = "deck-gate";
async function sha256(s) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(d)].map(b => b.toString(16).padStart(2, '0')).join('');
}
if (localStorage.getItem(KEY) === HASH) location.replace('./a/');
document.getElementById('f').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const v = document.getElementById('p').value.trim();
  if (await sha256(v) === HASH) {
    localStorage.setItem(KEY, HASH);
    location.replace('./a/');
  } else {
    document.getElementById('e').textContent = 'Невірний пароль';
  }
});
</script>
</body>
</html>
